<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: file: blob:; connect-src 'self' file:; object-src 'none'; base-uri 'none'; form-action 'none';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Markdown Viewer</title>
    <link rel="stylesheet" href="viewer.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="toolbar">
        <div class="document-state" aria-label="문서 상태">
          <strong id="fileLabel">새 문서</strong>
          <span id="statusLabel">준비됨</span>
          <span id="countLabel">0자</span>
        </div>

        <div class="url-open">
          <input id="urlInput" type="url" autocomplete="off" placeholder="file:///C:/path/document.md" />
          <button id="openUrlButton" type="button">열기</button>
        </div>

        <div class="base-path-manager" aria-label="기본 경로">
          <select id="basePathSelect" title="기본 경로"></select>
          <input id="basePathInput" type="text" autocomplete="off" placeholder="C:\My Projects\agent_orchestrator\debug" />
          <button id="saveBasePathButton" type="button">경로 저장</button>
          <button id="deleteBasePathButton" type="button">삭제</button>
        </div>

        <div class="actions" aria-label="문서 작업">
          <input id="fileInput" type="file" accept=".md,.markdown,.txt,text/markdown,text/plain" hidden />
          <button id="openFileButton" type="button">파일</button>
          <button id="downloadMarkdownButton" type="button">MD 다운로드</button>
          <button id="downloadHtmlButton" type="button">HTML 다운로드</button>
          <button id="copySourceButton" type="button">원문 복사</button>
          <button id="outlineButton" type="button" aria-pressed="true">Outline</button>
          <button id="modeButton" type="button" aria-pressed="true">라이트</button>
          <label class="theme-field" for="themeSelect">
            <span>테마</span>
            <select id="themeSelect"></select>
          </label>
        </div>
      </header>

      <main class="workspace outline-open">
        <section class="source-panel" aria-label="Markdown 원문">
          <textarea id="sourceInput" spellcheck="false"></textarea>
        </section>

        <section class="preview-panel" aria-label="Markdown 뷰어">
          <iframe id="previewFrame" title="Markdown preview"></iframe>
        </section>

        <aside id="outlinePanel" class="outline-panel" aria-label="문서 Outline">
          <nav id="outlineList" class="outline-list"></nav>
        </aside>
      </main>
    </div>

    <script src="vendor/purify.min.js"></script>
    <script src="vendor/marked.min.js"></script>
    <script src="vendor/highlight.min.js"></script>
    <script src="viewer.js"></script>
  </body>
</html>
