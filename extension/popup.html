<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Markdown Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --panel: #161b22;
        --border: #30363d;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #58a6ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 260px;
        margin: 0;
        padding: 14px;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 15px;
        letter-spacing: 0;
      }

      button {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 9px 10px;
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
      }

      button:hover,
      button:focus-visible {
        border-color: var(--accent);
        outline: none;
      }

      p {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <h1>Simple Markdown Viewer</h1>
    <button id="openViewerButton" type="button">뷰어 열기</button>
    <p>로컬 `.md` 링크 자동 열기는 확장 상세 화면에서 파일 URL 접근 허용이 필요합니다.</p>
    <script src="popup.js"></script>
  </body>
</html>
