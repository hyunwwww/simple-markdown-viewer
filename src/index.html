<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'none';" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Markdown Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="toolbar">
        <div class="title-block">
          <h1 class="visually-hidden">Markdown Viewer</h1>
          <div class="document-meta" aria-label="문서 상태">
            <span id="fileLabel">새 문서</span>
            <span id="saveState">새 문서</span>
            <span id="wordCount">0자</span>
          </div>
          <div class="tabs-frame" aria-label="열린 Markdown 문서">
            <div id="documentTabs" class="document-tabs" role="tablist" aria-label="문서 탭"></div>
            <button id="closeAllTabsButton" class="tabs-close-all" type="button">전체닫기</button>
          </div>
        </div>
        <form id="searchBar" class="search-bar" role="search" hidden>
          <label class="visually-hidden" for="searchInput">문서 검색</label>
          <input id="searchInput" type="search" placeholder="검색" autocomplete="off" />
          <span id="searchResultCount" class="search-result-count" aria-live="polite">0/0</span>
          <button id="searchPreviousButton" type="button" title="이전 결과" aria-label="이전 검색 결과">‹</button>
          <button id="searchNextButton" type="button" title="다음 결과" aria-label="다음 검색 결과">›</button>
          <button id="closeSearchButton" type="button" title="검색 닫기" aria-label="검색 닫기">×</button>
        </form>
        <div class="actions" aria-label="문서 작업">
          <button id="outlineButton" type="button" aria-pressed="false" title="Outline (F4)">Outline</button>
          <button id="importButton" type="button">가져오기</button>
          <button id="exportMarkdownButton" type="button">MD 내보내기</button>
          <button id="exportHtmlButton" type="button">HTML 내보내기</button>
          <button id="exportPdfButton" type="button">PDF 내보내기</button>
          <button id="copyMarkdownButton" type="button">원문 복사</button>
          <button id="themeButton" type="button" aria-pressed="false">다크 모드</button>
        </div>
      </header>

      <main class="workspace">
        <section class="editor-panel" aria-label="Markdown 원문">
          <textarea id="markdownInput" spellcheck="false"># Simple Markdown Viewer

왼쪽에 Markdown을 입력하거나 **가져오기**로 `.md` 파일을 열면 오른쪽에 미리보기가 표시됩니다.

''이렇게 감싼 텍스트'' 또는 아래처럼 인용문으로 강조할 수 있습니다.

> 다크 모드 인용문 강조 색상은 #7092BE입니다.

'''javascript
const theme = "github-dark";
console.log(theme);
'''

- 가져오기
- 내보내기
- 복사
- 다크 모드 / 라이트 모드
</textarea>
        </section>

        <div
          id="splitter"
          class="splitter"
          role="separator"
          aria-label="편집 영역과 미리보기 영역 크기 조절"
          aria-orientation="vertical"
          aria-valuemin="25"
          aria-valuemax="75"
          aria-valuenow="50"
          tabindex="0"
        ></div>

        <section class="preview-panel" aria-label="Markdown 미리보기">
          <article id="preview" class="markdown-body"></article>
        </section>

        <div
          id="outlineSplitter"
          class="outline-splitter"
          role="separator"
          aria-label="인덱스 영역 크기 조절"
          aria-orientation="vertical"
          aria-valuemin="120"
          aria-valuemax="360"
          aria-valuenow="150"
          tabindex="0"
          hidden
        ></div>

        <aside id="outlinePanel" class="outline-panel" aria-label="문서 Outline" hidden>
          <nav id="outlineList" class="outline-list" aria-label="문서 인덱스"></nav>
        </aside>
      </main>

      <footer class="statusbar">
        <span id="statusMessage">준비됨</span>
      </footer>
    </div>

    <script src="../node_modules/dompurify/dist/purify.min.js"></script>
    <script src="../node_modules/marked/marked.min.js"></script>
    <script src="../node_modules/@highlightjs/cdn-assets/highlight.min.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
