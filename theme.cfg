# ============================================================
# Markdown Viewer 색상 설정
# ============================================================
# 이 파일에서 앱의 모든 색상을 변경할 수 있습니다.
# 변경 후 앱을 재시작하면 적용됩니다.
#
# 지원 색상 형식: #rrggbb, #rgb, rgb(r,g,b), rgba(r,g,b,a), hsl(h,s%,l%) 등
# ============================================================


# ==============================
# 라이트 모드 — Catppuccin Latte
# ==============================
[light]

bg = #eff1f5
surface = #e6e9ef
surface-muted = #dce0e8
cell-bg = #e6e9ef
code-bg = #ccd0da
code-text = #4c4f69
border = #bcc0cc
text = #4c4f69
muted = #6c6f85
accent = #1e66f5
accent-strong = #179299
quote-bg = #e6e9ef
quote-text = #8839ef
quote-border = #8839ef
blockquote-text = #4c4f69
blockquote-border = #8839ef
button = #e6e9ef
button-hover = #dce0e8
search-highlight-bg = #e6db74
search-highlight-active-bg = #8839ef
search-highlight-active-text = #eff1f5
shadow = 0 12px 32px rgba(76, 79, 105, 0.12)

# ---- 라이트 코드 하이라이팅 (Catppuccin Latte) ----
hl-keyword = #8839ef
hl-number = #fe640b
hl-string = #40a02b
hl-type = #1e66f5
hl-attribute = #179299
hl-comment = #8c8fa1
hl-meta = #8839ef
hl-deletion-fg = #d20f39
hl-deletion-bg = rgba(210, 15, 57, 0.12)
hl-addition-fg = #40a02b
hl-addition-bg = rgba(64, 160, 43, 0.12)


# ==============================
# 다크 모드 — Codex Monokai
# ==============================
[dark]

bg = #272822
surface = #272822
surface-muted = #3e3d32
cell-bg = #3A3B35
code-bg = #3A3B35
code-text = #f8f8f2
border = #49483e
text = #f8f8f2
muted = #75715e
accent = #66d9e8
accent-strong = #a6e22e
quote-bg = #3e3d32
quote-text = #e6db74
quote-border = #f92672
blockquote-text = #f8f8f2
blockquote-border = #f92672
button = #3e3d32
button-hover = #49483e
search-highlight-bg = #e6db74
search-highlight-active-bg = #f92672
search-highlight-active-text = #f8f8f2
shadow = 0 12px 36px rgba(0, 0, 0, 0.28)

# ---- 다크 코드 하이라이팅 (Monokai) ----
hl-keyword = #f92672
hl-number = #ae81ff
hl-string = #e6db74
hl-type = #66d9e8
hl-attribute = #a6e22e
hl-comment = #75715e
hl-meta = #ae81ff
hl-deletion-fg = #f92672
hl-deletion-bg = rgba(249, 38, 114, 0.18)
hl-addition-fg = #a6e22e
hl-addition-bg = rgba(166, 226, 46, 0.15)
